<!DOCTYPE html>
<html>
<head>
  <title>Service Health Check</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f8f9fa; }
    h1 { color: #333; }
    .service { margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
    .healthy { color: green; }
    .unhealthy { color: red; }
    .unknown { color: gray; }
  </style>
</head>
<body>
  <h1>🔍 System Health Monitor</h1>
  <div id="services">Checking...</div>

  <script>
    async function fetchHealth() {
      const res = await fetch('/health');
      const data = await res.json();
      const container = document.getElementById('services');
      container.innerHTML = '';

      for (const [name, status] of Object.entries(data)) {
        const div = document.createElement('div');
        div.className = 'service';
        if (status === true) {
          div.innerHTML = `<strong>${name}</strong>: <span class="healthy">✅ Healthy</span>`;
        } else if (status === false) {
          div.innerHTML = `<strong>${name}</strong>: <span class="unhealthy">❌ Unreachable</span>`;
        } else {
          div.innerHTML = `<strong>${name}</strong>: <span class="unknown">ℹ️ No Check Available</span>`;
        }
        container.appendChild(div);
      }
    }

    fetchHealth();
    setInterval(fetchHealth, 5000); // Auto-refresh every 5 seconds
  </script>
</body>
</html>
